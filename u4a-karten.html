<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma famille – Vokabeltrainer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #1e1e2f;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 30px 15px;
  }
  h1 { color: #8ab4f8; margin-bottom: 8px; text-align: center; }
  .info { color: #aaa; margin-bottom: 25px; font-size: 0.95rem; text-align: center; }
  .progress { margin-bottom: 18px; font-size: 0.95rem; color: #bbb; }

  /* Karte */
  .card-container {
    perspective: 1200px;
    width: 340px;
    height: 220px;
    margin-bottom: 25px;
  }
  .card {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.6s;
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
  .card-front {
    background: #2c2c44;
    border: 2px solid #3d3d5c;
  }
  .card-back {
    background: #34344f;
    border: 2px solid #4a4a6a;
    transform: rotateY(180deg);
  }
  .word {
    font-size: 1.6rem;
    font-weight: bold;
    text-align: center;
    color: #fff;
  }
  .lang-label {
    position: absolute;
    top: 12px;
    left: 14px;
    font-size: 0.75rem;
    color: #8ab4f8;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .tap-hint {
    position: absolute;
    bottom: 12px;
    font-size: 0.75rem;
    color: #888;
  }

  /* Aussprache-Button */
  .speak-btn {
    margin-top: 18px;
    background: #3d6fd6;
    border: none;
    color: #fff;
    font-size: 1.3rem;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .speak-btn:hover { background: #5485e8; }
  .speak-btn.hidden { visibility: hidden; }

  /* Antwort-Buttons */
  .answer-buttons {
    display: flex;
    gap: 18px;
  }
  .answer-buttons button {
    padding: 12px 22px;
    font-size: 1rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: #fff;
    transition: opacity 0.2s, transform 0.1s;
  }
  .answer-buttons button:active { transform: scale(0.96); }
  .knew { background: #2e8b57; }
  .knew:hover { background: #379e64; }
  .didnt { background: #b5483f; }
  .didnt:hover { background: #cc544a; }
  .answer-buttons button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Endbildschirm */
  .end-screen {
    text-align: center;
    background: #2c2c44;
    padding: 30px 40px;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
  .end-screen h2 { color: #8ab4f8; margin-bottom: 14px; }
  .end-screen p { color: #ccc; margin-bottom: 20px; }
  .end-screen button {
    padding: 12px 26px;
    font-size: 1rem;
    border: none;
    border-radius: 10px;
    background: #3d6fd6;
    color: #fff;
    cursor: pointer;
  }
  .end-screen button:hover { background: #5485e8; }

  .hide { display: none; }
</style>
</head>
<body>
  <h1>Ma famille</h1>
  <p class="info">Klicke auf die Karte, um sie umzudrehen. Erst danach kannst du antworten.</p>

  <div class="progress" id="progress"></div>

  <div class="card-container hide" id="cardContainer">
    <div class="card" id="card">
      <!-- Vorderseite -->
      <div class="card-face card-front">
        <span class="lang-label" id="frontLabel"></span>
        <span class="word" id="frontWord"></span>
        <button class="speak-btn" id="frontSpeak" title="Aussprache">🔊</button>
        <span class="tap-hint">Karte umdrehen →</span>
      </div>
      <!-- Rückseite -->
      <div class="card-face card-back">
        <span class="lang-label" id="backLabel"></span>
        <span class="word" id="backWord"></span>
        <button class="speak-btn" id="backSpeak" title="Aussprache">🔊</button>
        <span class="tap-hint">← zurückdrehen</span>
      </div>
    </div>
  </div>

  <div class="answer-buttons hide" id="answerButtons">
    <button class="knew" id="knewBtn">Wusste ich!</button>
    <button class="didnt" id="didntBtn">Wusste ich nicht.</button>
  </div>

  <div class="end-screen hide" id="endScreen">
    <h2>Bravo ! 🎉</h2>
    <p id="endText"></p>
    <button id="restartBtn">Nochmal üben</button>
  </div>

<script>
  // Vokabelliste
  const vocab = [
    { fr: "une mère", de: "eine Mutter" },
    { fr: "un père", de: "ein Vater" },
    { fr: "une belle-mère", de: "eine Stiefmutter" },
    { fr: "un beau-père", de: "ein Stiefvater" },
    { fr: "une grand-mère", de: "eine Oma" },
    { fr: "un grand-père", de: "ein Opa" },
    { fr: "une sœur", de: "eine Schwester" },
    { fr: "un frère", de: "ein Bruder" },
    { fr: "une demi-sœur", de: "eine Halbschwester" },
    { fr: "un demi-frère", de: "ein Halbbruder" },
    { fr: "une tante", de: "eine Tante" },
    { fr: "un oncle", de: "ein Onkel" }
  ];

  // DOM-Referenzen
  const cardContainer = document.getElementById('cardContainer');
  const card = document.getElementById('card');
  const frontWord = document.getElementById('frontWord');
  const backWord = document.getElementById('backWord');
  const frontLabel = document.getElementById('frontLabel');
  const backLabel = document.getElementById('backLabel');
  const frontSpeak = document.getElementById('frontSpeak');
  const backSpeak = document.getElementById('backSpeak');
  const answerButtons = document.getElementById('answerButtons');
  const knewBtn = document.getElementById('knewBtn');
  const didntBtn = document.getElementById('didntBtn');
  const progress = document.getElementById('progress');
  const endScreen = document.getElementById('endScreen');
  const endText = document.getElementById('endText');
  const restartBtn = document.getElementById('restartBtn');

  let queue = [];
  let currentCard = null;
  let isFlipped = false;
  let isAnimating = false;
  let totalInitial = 0;
  let wrongCount = 0;
  let answeredCount = 0;

  // Hilfsfunktion: Array mischen (Fisher-Yates)
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Queue aufbauen: gemischt, je Karte zufällige Richtung
  function buildQueue() {
    return shuffle(vocab).map(v => ({
      fr: v.fr,
      de: v.de,
      direction: Math.random() < 0.5 // true = FR→DE, false = DE→FR
    }));
  }

  // Französisches Wort vorlesen
  function speakFrench(text) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'fr-FR';
    const frVoice = speechSynthesis.getVoices().find(v => v.lang.startsWith('fr'));
    if (frVoice) utter.voice = frVoice;
    speechSynthesis.speak(utter);
  }

  frontSpeak.addEventListener('click', (e) => {
    e.stopPropagation();
    if (currentCard) speakFrench(currentCard.fr);
  });
  backSpeak.addEventListener('click', (e) => {
    e.stopPropagation();
    if (currentCard) speakFrench(currentCard.fr);
  });

  // Karte laden
  function loadCard(c) {
    currentCard = c;
    if (c.direction) {
      frontWord.textContent = c.fr;
      backWord.textContent = c.de;
      frontLabel.textContent = "Français";
      backLabel.textContent = "Deutsch";
      frontSpeak.classList.remove('hidden');
      backSpeak.classList.add('hidden');
    } else {
      frontWord.textContent = c.de;
      backWord.textContent = c.fr;
      frontLabel.textContent = "Deutsch";
      backLabel.textContent = "Français";
      frontSpeak.classList.add('hidden');
      backSpeak.classList.remove('hidden');
    }
    // Antwort-Buttons sperren, bis die Karte gewendet wurde
    knewBtn.disabled = true;
    didntBtn.disabled = true;
    updateProgress();
  }

  // Fortschrittsanzeige (robuster Zähler)
  function updateProgress() {
    progress.textContent = `Bearbeitet: ${answeredCount} – noch in der Liste: ${queue.length + 1}`;
  }

  // Karte umdrehen
  function flipCard() {
    if (isAnimating) return;
    isFlipped = !isFlipped;
    card.classList.toggle('flipped', isFlipped);
    // Buttons nur aktivieren, wenn die Rückseite zu sehen ist
    if (isFlipped) {
      knewBtn.disabled = false;
      didntBtn.disabled = false;
    } else {
      knewBtn.disabled = true;
      didntBtn.disabled = true;
    }
  }

  card.addEventListener('click', flipCard);

  // Antwort verarbeiten
  function handleAnswer(knew) {
    if (isAnimating || !isFlipped) return;
    speechSynthesis.cancel();
    answeredCount++;

    // Falsch beantwortete Karte hinten wieder anhängen
    if (!knew) {
      wrongCount++;
      queue.push(currentCard);
    }

    // Buttons während des Übergangs sperren
    knewBtn.disabled = true;
    didntBtn.disabled = true;
    nextCard();
  }

  // Zur nächsten Karte (erst nach abgeschlossener Wende-Animation)
  function nextCard() {
    isAnimating = true;

    if (isFlipped) {
      // Karte zurückdrehen und auf Ende der Animation warten
      isFlipped = false;
      card.classList.remove('flipped');

      const onEnd = (e) => {
        if (e.propertyName !== 'transform') return;
        card.removeEventListener('transitionend', onEnd);
        isAnimating = false;
        proceed();
      };
      card.addEventListener('transitionend', onEnd);
    } else {
      isAnimating = false;
      proceed();
    }
  }

  function proceed() {
    if (queue.length === 0) {
      showEnd();
    } else {
      loadCard(queue.shift());
    }
  }

  // Endbildschirm
  function showEnd() {
    cardContainer.classList.add('hide');
    answerButtons.classList.add('hide');
    progress.classList.add('hide');
    endScreen.classList.remove('hide');
    endText.textContent = `Du hast alle ${totalInitial} Vokabeln durchgearbeitet.` +
      (wrongCount > 0
        ? ` Die ${wrongCount} mit „Wusste ich nicht." markierten Karten wurden wiederholt.`
        : ` Und das ganz ohne Fehler – super gemacht!`);
  }

  knewBtn.addEventListener('click', () => handleAnswer(true));
  didntBtn.addEventListener('click', () => handleAnswer(false));

  restartBtn.addEventListener('click', start);

  // Start / Neustart
  function start() {
    queue = buildQueue();
    totalInitial = queue.length;
    wrongCount = 0;
    answeredCount = 0;
    isFlipped = false;
    card.classList.remove('flipped');
    cardContainer.classList.remove('hide');
    answerButtons.classList.remove('hide');
    progress.classList.remove('hide');
    endScreen.classList.add('hide');
    loadCard(queue.shift());
  }

  start();
</script>
</body>
</html>
